<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Photobooth GC">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#FEF2EB">
  <link rel="manifest" href="./manifest.webmanifest?v=gc-2026-04">
  <link rel="icon" href="./icon.svg?v=gc-2026-04" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg?v=gc-2026-04">
  <link rel="stylesheet" href="./styles.css?v=gc-2026-04">
  <title>Photobooth Gabrielle & Corentin</title>
</head>
<body>
  <main class="app-shell" id="appShell">
    <section class="screen screen-home is-active" id="homeScreen" aria-label="Accueil photobooth">
      <header class="app-header">
        <div class="header-spacer" aria-hidden="true"></div>
        <h1 class="couple-title">Gabrielle & Corentin</h1>
        <button class="settings-link" id="settingsButton" type="button">Réglages</button>
      </header>

      <section class="live-frame home-frame" aria-label="Vue directe de la caméra">
        <video id="liveVideo" autoplay muted playsinline></video>
        <div class="camera-placeholder" id="cameraPlaceholder">Vue caméra</div>
      </section>

      <footer class="home-footer">
        <button class="main-photo-button" id="takePhotoButton" type="button">
          <span>Prendre</span>
          <span>une photo</span>
        </button>
        <p class="micro-status" id="statusText">Prêt</p>
      </footer>
    </section>

    <section class="screen screen-countdown" id="countdownScreen" aria-label="Compte à rebours">
      <section class="live-frame countdown-frame">
        <video id="countVideo" autoplay muted playsinline></video>
        <div class="count-number" id="countNumber">5</div>
      </section>
    </section>

    <section class="screen screen-result" id="resultScreen" aria-label="Photo prise">
      <header class="app-header result-header">
        <div class="header-spacer" aria-hidden="true"></div>
        <h1 class="couple-title">Gabrielle & Corentin</h1>
        <div class="header-spacer" aria-hidden="true"></div>
      </header>

      <section class="result-frame" aria-label="Photo prise">
        <img id="resultPreview" class="result-preview" alt="Photo prise">
      </section>

      <footer class="result-actions">
        <button class="pill-button" id="printButton" type="button">
          <span>Imprimer</span>
          <span>avec Airprint</span>
        </button>
        <button class="pill-button" id="recoverButton" type="button">Réccupérer</button>
        <button class="pill-button" id="continueButton" type="button">Continuer</button>
      </footer>
      <p class="result-note" id="resultStatus">Retour automatique à l'accueil après 30 secondes.</p>
    </section>

    <section class="modal-screen" id="pinPanel" aria-label="Code réglages" aria-hidden="true">
      <div class="modal-card code-card">
        <button class="close-button" id="closePinButton" type="button">×</button>
        <h2>Réglages</h2>
        <p>Entrez le code administrateur.</p>
        <input id="pinInput" class="pin-input" inputmode="numeric" autocomplete="one-time-code" maxlength="8" placeholder="••••••••">
        <button class="admin-button" id="validatePinButton" type="button">Valider</button>
        <p class="error-text" id="pinError"></p>
      </div>
    </section>

    <section class="modal-screen" id="settingsPanel" aria-label="Panneau de configuration" aria-hidden="true">
      <div class="modal-card settings-card">
        <button class="close-button" id="closeSettingsButton" type="button">×</button>
        <h2>Configuration</h2>
        <div class="settings-grid">
          <label>Caméra
            <select id="cameraSelect"></select>
          </label>
          <label>Résolution
            <select id="resolutionSelect">
              <option value="1280x720">720p - secours</option>
              <option value="1920x1080" selected>1080p - recommandé</option>
              <option value="3840x2160">4K - test uniquement</option>
            </select>
          </label>
          <label>Miroir écran
            <select id="mirrorSelect">
              <option value="preview" selected>Oui, écran seulement</option>
              <option value="none">Non</option>
              <option value="output">Oui, écran et photo</option>
            </select>
          </label>
          <label>Nom imprimé
            <input id="eventTitleInput" value="Gabrielle & Corentin">
          </label>
          <label>Date imprimée
            <input id="eventDateInput" value="22.08.2026">
          </label>
          <label>Stockage
            <input id="storageInfo" value="Téléchargement automatique" disabled>
          </label>
        </div>
        <div class="settings-actions">
          <button class="admin-secondary" id="refreshCamerasButton" type="button">Rechercher caméra</button>
          <button class="admin-secondary" id="restartCameraButton" type="button">Redémarrer caméra</button>
          <button class="admin-secondary danger" id="clearStorageButton" type="button">Effacer historique</button>
          <button class="admin-button" id="saveSettingsButton" type="button">OK</button>
        </div>
        <p class="settings-help">La caméra externe apparaît souvent sous le nom USB Camera, Capture, HDMI ou UVC.</p>
      </div>
    </section>
  </main>

  <div id="printArea" aria-hidden="true">
    <img id="printImage" alt="Photo finale">
  </div>

  <script src="./app.js?v=gc-2026-04"></script>
</body>
</html>
