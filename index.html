<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Photobooth GC">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#FEF2EB">
  <link rel="manifest" href="./manifest.webmanifest?v=gc-2026-03">
  <link rel="icon" href="./icon.svg?v=gc-2026-03" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg?v=gc-2026-03">
  <link rel="stylesheet" href="./styles.css?v=gc-2026-03">
  <title>Photobooth Gabrielle & Corentin</title>
</head>
<body>
  <main class="app-shell" id="appShell">
    <section class="screen screen-home is-active" id="homeScreen" aria-label="Accueil photobooth">
      <header class="topline">
        <img class="brand-mark" src="./icon.svg?v=gc-2026-03" alt="Logo Gabrielle et Corentin">
        <button class="settings-link" id="settingsButton" type="button">Réglages</button>
      </header>

      <div class="hero-grid">
        <section class="intro-copy">
          <p class="eyebrow">Gabrielle & Corentin</p>
          <h1>Photobooth</h1>
          <p class="date-line">22 août 2026</p>
        </section>

        <section class="camera-card" aria-label="Vue directe de la caméra">
          <video id="liveVideo" autoplay muted playsinline></video>
          <div class="camera-placeholder" id="cameraPlaceholder">
            <span>Vue caméra</span>
          </div>
        </section>
      </div>

      <footer class="home-actions">
        <button class="primary-action" id="takePhotoButton" type="button">Prendre une photo</button>
        <p class="micro-status" id="statusText">Prêt</p>
      </footer>
    </section>

    <section class="screen screen-countdown" id="countdownScreen" aria-label="Compte à rebours">
      <div class="count-camera">
        <video id="countVideo" autoplay muted playsinline></video>
      </div>
      <div class="count-number" id="countNumber">5</div>
      <p class="count-caption">Ne bougez plus...</p>
    </section>

    <section class="screen screen-result" id="resultScreen" aria-label="Photo prise">
      <header class="result-head">
        <img class="brand-mark small" src="./icon.svg?v=gc-2026-03" alt="Logo Gabrielle et Corentin">
        <p>Votre photo est prête</p>
      </header>

      <section class="result-preview-wrap">
        <img id="resultPreview" class="result-preview" alt="Photo finale prête à imprimer et partager">
      </section>

      <footer class="result-actions">
        <button class="secondary-action" id="printButton" type="button">AirPrint</button>
        <button class="secondary-action" id="shareButton" type="button">Partager</button>
        <button class="primary-action compact" id="continueButton" type="button">Continuer</button>
      </footer>
      <p class="micro-status result-note" id="resultStatus">Retour automatique à l'accueil après 30 secondes.</p>
    </section>

    <section class="modal-screen" id="pinPanel" aria-label="Code réglages" aria-hidden="true">
      <div class="modal-card code-card">
        <button class="close-button" id="closePinButton" type="button">×</button>
        <h2>Réglages</h2>
        <p>Entrez le code administrateur.</p>
        <input id="pinInput" class="pin-input" inputmode="numeric" autocomplete="one-time-code" maxlength="8" placeholder="••••••••">
        <button class="primary-action compact" id="validatePinButton" type="button">Valider</button>
        <p class="error-text" id="pinError"></p>
      </div>
    </section>

    <section class="modal-screen" id="settingsPanel" aria-label="Panneau de configuration" aria-hidden="true">
      <div class="modal-card settings-card">
        <button class="close-button" id="closeSettingsButton" type="button">×</button>
        <h2>Configuration</h2>
        <div class="settings-grid">
          <label>Caméra
            <select id="cameraSelect"></select>
          </label>
          <label>Résolution
            <select id="resolutionSelect">
              <option value="1280x720">720p - secours</option>
              <option value="1920x1080" selected>1080p - recommandé</option>
              <option value="3840x2160">4K - test uniquement</option>
            </select>
          </label>
          <label>Miroir écran
            <select id="mirrorSelect">
              <option value="preview" selected>Oui, écran seulement</option>
              <option value="none">Non</option>
              <option value="output">Oui, écran et photo</option>
            </select>
          </label>
          <label>Nom de l'événement
            <input id="eventTitleInput" value="Gabrielle & Corentin">
          </label>
          <label>Date imprimée
            <input id="eventDateInput" value="22 août 2026">
          </label>
          <label>Stockage local
            <input id="storageInfo" value="Historique iPad activé" disabled>
          </label>
        </div>
        <div class="settings-actions">
          <button class="secondary-action" id="refreshCamerasButton" type="button">Rechercher caméra</button>
          <button class="secondary-action" id="restartCameraButton" type="button">Redémarrer caméra</button>
          <button class="secondary-action danger" id="clearStorageButton" type="button">Effacer historique</button>
          <button class="primary-action compact" id="saveSettingsButton" type="button">OK</button>
        </div>
        <p class="micro-status">La caméra externe apparaît souvent sous le nom USB Camera, Capture, HDMI ou UVC.</p>
      </div>
    </section>
  </main>

  <div id="printArea" aria-hidden="true">
    <img id="printImage" alt="Photo finale">
  </div>

  <script src="./app.js?v=gc-2026-03"></script>
</body>
</html>
